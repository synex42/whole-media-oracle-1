<script>
/* ═══════════════════════
   DATA
═══════════════════════ */
/* ═══════════════════════
   DATA — loaded from txt files
   Fallback placeholder arrays are used if files are missing.
═══════════════════════ */
let QUESTIONS = [
  { text:"(loading questions...)", source:"", year:"" }
];
let SWAMP_QUESTIONS = [
  { text:"(loading swamp questions...)", source:"", year:"" }
];

/* ── Parse questions/swamp_questions txt files ──
   Each line: Question text ; Source title ; Year */
function parseTxt(raw){
  return raw.split('\n')
    .map(l=>l.trim())
    .filter(l=>l.length>0 && !l.startsWith('#'))
    .map(l=>{
      const parts = l.split(';').map(p=>p.trim());
      return { text:parts[0]||'', source:parts[1]||'', year:parts[2]||'' };
    })
    .filter(q=>q.text.length>0);
}

/* ── Parse choices.txt into CHOICES array ──
   Each line: Lens ; prism1 ; prism2 ; ... ; prism12 */
function parseChoices(raw){
  return raw.split('\n')
    .map(l=>l.trim())
    .filter(l=>l.length>0 && !l.startsWith('#'))
    .map(l=>{
      const parts = l.split(';').map(p=>p.trim());
      return {
        lens:   parts[0] || '',
        prisms: parts.slice(1).filter(p=>p.length>0)
      };
    })
    .filter(c=>c.lens.length>0 && c.prisms.length>0);
}

async function loadDataFiles(){
  try {
    const r1 = await fetch('questions.txt');
    if(r1.ok) QUESTIONS = parseTxt(await r1.text());
  } catch(e){ console.warn('questions.txt not found, using defaults'); }

  try {
    const r2 = await fetch('swamp_questions.txt');
    if(r2.ok) SWAMP_QUESTIONS = parseTxt(await r2.text());
  } catch(e){ console.warn('swamp_questions.txt not found, using defaults'); }

  try {
    const r3 = await fetch('choices.txt');
    if(r3.ok) CHOICES = parseChoices(await r3.text());
  } catch(e){ console.warn('choices.txt not found, using defaults'); }

  try {
    const r4 = await fetch('wec_files.txt');
    if(r4.ok){
      WEC_FILES = (await r4.text())
        .split('\n')
        .map(l=>l.trim())
        .filter(l=>l.length>0 && !l.startsWith('#'));
      console.log('wec_files.txt loaded:', WEC_FILES.length, 'files. First:', WEC_FILES[0]);
    } else {
      console.warn('wec_files.txt not ok:', r4.status);
    }
  } catch(e){ console.warn('wec_files.txt error:', e); }

  try {
    const r5 = await fetch('images_index.txt');
    if(r5.ok){
      (await r5.text())
        .split('\n')
        .map(l=>l.trim())
        .filter(l=>l.length>0 && !l.startsWith('#') && l.toLowerCase().endsWith('.jpg'))
        .forEach(path=>{
          if(path.includes('/LGO/'))      IMAGE_POOLS.LGO.push(path);
          else if(path.includes('/WEC/')) IMAGE_POOLS.WEC.push(path);
          else if(path.includes('/CEQ/')) IMAGE_POOLS.CEQ.push(path);
          else if(path.includes('/WW/'))  IMAGE_POOLS.WW.push(path);
        });
    }
  } catch(e){ console.warn('images_index.txt not found'); }
}

let CHOICES = [
  { lens:"Time",        prisms:["memory","future","delay","rhythm","cycle","pause","threshold","decay","duration","urgency","patience","erosion"] },

  { lens:"Ritual",      prisms:["repetition","threshold","community","object","body","transformation","prohibition","offering","time","space","inheritance","forgetting"] },

const IMAGE_POOLS = {
  LGO: [],
  WEC: [],
  CEQ: [],
  WW:  []
};

let WEC_FILES = [];  // populated from wec_files.txt


let currentQuestion="", currentSource="", currentYear="", selectedLenses=[], chosenLens=null, chosenPrism=null, chosenLensIdx=null, chosenPrismIdx=null;

/* ═══════════════════════
   UTILS
═══════════════════════ */
/* Split a sentence into 3 lines of roughly equal word count */
function splitThreeLines(text){
  const words = text.split(' ');
  const n = words.length;
  if(n <= 3) return words.join('\n');
  const third = Math.ceil(n / 3);
  const l1 = words.slice(0, third).join(' ');
  const l2 = words.slice(third, third*2).join(' ');
  const l3 = words.slice(third*2).join(' ');
  return [l1, l2, l3].filter(l=>l.length>0).join('\n');
}

const pick  = a => a[Math.floor(Math.random()*a.length)];
const shuffle = a => {
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
  return b;
};
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
const NS="http://www.w3.org/2000/svg";
function el(tag,attrs){
  const e=document.createElementNS(NS,tag);
  for(const[k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  return e;
}

/* ═══════════════════════
   INIT
═══════════════════════ */
function initOracle(){
  chosenLens=null; chosenPrism=null; chosenLensIdx=null; chosenPrismIdx=null;
  const q = pick(QUESTIONS);
  currentQuestion = q.text;
  currentSource   = q.source;
  currentYear     = q.year;
  selectedLenses  = shuffle(CHOICES).slice(0,9);
  render(false);
}

/* ═══════════════════════
   RENDER  (SVG-based — scales to any window size)
═══════════════════════ */
function render(showOuter){
  const svg = document.getElementById('main-svg');
  svg.innerHTML="";

  const W=window.innerWidth, H=window.innerHeight;
  const CX=W/2, CY=H/2;
  const BASE=Math.min(W,H);
  const R1   = BASE*0.22;
  const R2   = BASE*0.42;
  const DOT  = Math.max(4, BASE*0.007);
  const FS   = Math.max(11, BASE*0.0135);   // font size px ≈14pt at 1080p
  const GAP  = DOT + FS*0.85;               // label distance from dot

  /* ── question ── */
  const QW=340, QH=220;
  const fo=el('foreignObject',{x:CX-QW/2, y:CY-QH/2, width:QW, height:QH});
  const qDiv=document.createElement('div');
  qDiv.style.cssText=`
    font-family:'Oswald', Arial, sans-serif;font-weight:bold;font-size:${FS}px;
    color:#fff;text-align:center;line-height:1.5;
    width:100%;height:100%;
    display:flex;align-items:center;justify-content:center;`;
  const qInner=document.createElement('div');
  qInner.style.cssText=`text-align:center;white-space:pre-line;`;
  qInner.textContent=splitThreeLines(currentQuestion);
  qDiv.appendChild(qInner);
  fo.appendChild(qDiv);
  svg.appendChild(fo);

  // if a lens is already chosen, question stays blue
  if(chosenLens) qInner.style.color='#00aaff';

  /* ── inner ring ── */
  makeRing(svg, CX,CY, R1, DOT, FS, GAP,
    selectedLenses.map(c=>c.lens), 9, 1, 0, onLensClick);

  // restore chosen lens colour after re-render
  if(chosenLensIdx!==null) setRingColor(1, chosenLensIdx, '#00aaff');

  /* ── outer ring (after lens chosen) ── */
  if(showOuter && chosenLens){
    const obj=CHOICES.find(c=>c.lens===chosenLens);
    const prisms=obj ? shuffle(obj.prisms).slice(0,9) : [];
    makeRing(svg, CX,CY, R2, DOT*1.3, FS, GAP*1.1,
      prisms, 9, 2, 20, onPrismClick);
  }
}

/* ─────────────────────
   Draw one ring
───────────────────── */
function makeRing(svg, CX,CY, R, dotR, FS, GAP, labels, count, ring, rotationDeg, handler){
  const rotRad = rotationDeg * Math.PI / 180;
  for(let i=0;i<count;i++){
    const angle=(i/count)*2*Math.PI - Math.PI/2 + rotRad;
    const bx=CX+R*Math.cos(angle);
    const by=CY+R*Math.sin(angle);
    const lx=CX+(R+GAP)*Math.cos(angle);
    const ly=CY+(R+GAP)*Math.sin(angle);

    /* dot */
    const c=el('circle',{cx:bx,cy:by,r:dotR,fill:'#fff',cursor:'pointer'});
    c.dataset.ring=ring;
    c.dataset.idx=i;
    c.dataset.value=labels[i];
    c.addEventListener('mouseenter',()=>{ if(c.getAttribute('fill')!=='#00aaff') c.setAttribute('fill','#00aaff'); });
    c.addEventListener('mouseleave',()=>{ if(!c.dataset.selected) c.setAttribute('fill','#fff'); });
    c.addEventListener('click',()=>handler(c,labels[i],i));
    svg.appendChild(c);

    /* label — anchor based on angle quadrant */
    const cosA=Math.cos(angle), sinA=Math.sin(angle);
    let anchor='middle', ox=0, oy=FS*0.38;
    if(cosA>0.25)      { anchor='start';  ox=dotR*0.4; }
    else if(cosA<-0.25){ anchor='end';    ox=-dotR*0.4; }
    if(sinA<-0.7)        oy=-dotR*0.8;
    else if(sinA>0.7)    oy=FS*1.1;

    const t=el('text',{
      x:lx+ox, y:ly+oy,
      fill:'#fff',
      'font-family':'Oswald, Arial, sans-serif',
      'font-size':FS,
      'font-weight':'normal',
      'text-anchor':anchor,
      'pointer-events':'none',
      'data-ring':ring,
      'data-idx':i
    });
    t.textContent=labels[i];
    svg.appendChild(t);
  }
}

/* ═══════════════════════
   CLICK HANDLERS
═══════════════════════ */
function setRingColor(ring, idx, color){
  const svg=document.getElementById('main-svg');
  svg.querySelectorAll(`[data-ring="${ring}"]`).forEach(e=>{
    if(idx===null || String(e.dataset.idx)===String(idx)){
      e.setAttribute('fill',color);
      if(e.tagName==='circle') e.dataset.selected='1';
    } else {
      e.setAttribute('fill','#fff');
      if(e.tagName==='circle') delete e.dataset.selected;
    }
  });
}

function setQuestionColor(color){
  const svg=document.getElementById('main-svg');
  const inner=svg.querySelector('foreignObject div div');
  if(inner) inner.style.color=color;
}

function onLensClick(circle, value, idx){
  setRingColor(1, idx, '#00aaff');
  setQuestionColor('#00aaff');
  chosenLens=value;
  chosenLensIdx=idx;
  setTimeout(()=>render(true), 250);
}

function onPrismClick(circle, value, idx){
  setRingColor(2, idx, '#00aaff');
  chosenPrism=value;
  chosenPrismIdx=idx;
  setTimeout(()=>showSummary(), 300);
}

function showSummary(){
  const svg=document.getElementById('main-svg');

  // hide all ring-1 items except the chosen lens index
  svg.querySelectorAll('[data-ring="1"]').forEach(e=>{
    if(String(e.dataset.idx)!==String(chosenLensIdx)) e.style.opacity='0';
  });
  // hide all ring-2 items except the chosen prism index
  svg.querySelectorAll('[data-ring="2"]').forEach(e=>{
    if(String(e.dataset.idx)!==String(chosenPrismIdx)) e.style.opacity='0';
  });

  setTimeout(showProcessing, 5000);
}

function showProcessing(){
  showScreen('processing-screen');
  setTimeout(showReveal, 5000);
}

/* ═══════════════════════
   REVEAL
═══════════════════════ */
function showReveal(){
  showScreen('reveal-screen');
  document.getElementById('reveal-question').textContent = currentQuestion;
  document.getElementById('reveal-lens').textContent     = chosenLens;
  document.getElementById('reveal-prism').textContent    = chosenPrism;
  document.getElementById('reveal-source').textContent   = currentSource + '; ' + currentYear;
  buildCollage();
  setTimeout(initFrog, 100);
}

/* ═══════════════════════
   COLLAGE
═══════════════════════ */
function buildCollage(){
  const collage=document.getElementById('collage');
  collage.querySelectorAll('.small-img,.text-fragment').forEach(e=>e.remove());

  const all = Object.values(IMAGE_POOLS).flat();
  const bgImg=document.getElementById('bg-image');
  bgImg.classList.remove('loaded');

  if(all.length>0){
    bgImg.onload=()=>bgImg.classList.add('loaded');
    bgImg.src=pick(all);
  } else {
    bgImg.src=placeholder(1870,1030,'#111122');
    bgImg.classList.add('loaded');
  }

  [['8%','4%'],['55%','15%'],['28%',null]].forEach(([top,left],i)=>{
    const img=document.createElement('img');
    img.className='small-img';
    img.style.top=top;
    if(left) img.style.left=left; else img.style.right='4%';
    const colors=['#2d2d6b','#4a1942','#0d3d29'];
    const rem=all.length>1?shuffle(all).slice(1,4):[];
    if(rem[i]){ img.onload=()=>setTimeout(()=>img.classList.add('loaded'),200*i); img.src=rem[i]; }
    else { img.src=placeholder(240,160,colors[i]); setTimeout(()=>img.classList.add('loaded'),400+200*i); }
    collage.appendChild(img);
  });

  // text fragments — search WEC files for prism word, pick 3, place without overlap
  fetchFragments(WEC_FILES, chosenPrism, 3).then(sentences=>{
    const placed = []; // track placed boxes for overlap checking
    const CW = collage.offsetWidth  || 800;
    const CH = collage.offsetHeight || 600;
    const FRAG_W = 260, FRAG_H = 120; // approximate box size
    const MARGIN = 20;

    sentences.forEach((sentence, i)=>{
      const d = document.createElement('div');
      d.className = 'text-fragment';
      d.textContent = sentence;

      // try up to 30 random positions, pick first non-overlapping one
      let px = MARGIN, py = MARGIN;
      for(let attempt=0; attempt<30; attempt++){
        const tx = MARGIN + Math.random() * (CW - FRAG_W - MARGIN*2);
        const ty = MARGIN + Math.random() * (CH - FRAG_H - MARGIN*2);
        const overlaps = placed.some(b=>
          tx < b.x + b.w + MARGIN &&
          tx + FRAG_W + MARGIN > b.x &&
          ty < b.y + b.h + MARGIN &&
          ty + FRAG_H + MARGIN > b.y
        );
        if(!overlaps){ px=tx; py=ty; break; }
      }
      placed.push({ x:px, y:py, w:FRAG_W, h:FRAG_H });

      d.style.left = px + 'px';
      d.style.top  = py + 'px';
      setTimeout(()=>d.classList.add('loaded'), 800+300*i);
      collage.appendChild(d);
    });
  });
}

/* ═══════════════════════
   TEXT SEARCH
   Searches all files in a folder for the prism word,
   collects sentences preceding each match,
   returns up to `count` picked randomly.
   Falls back to random sentences if no matches found (strategy B).
═══════════════════════ */
function splitSentences(text){
  return text
    .replace(/\r\n/g,'\n')
    .split(/(?<=\.)\s+/)
    .map(s=>s.trim())
    .filter(s=>s.length>20);
}

async function fetchFragments(files, prismWord, count){
  if(!files || files.length===0){ console.warn('fetchFragments: no files provided'); return []; }

  // randomly sample 20 files for speed
  const sample = shuffle([...files]).slice(0, 20);
  console.log('fetchFragments: searching', sample.length, 'random files for "'+prismWord+'"');

  const word = prismWord.toLowerCase();
  const candidates  = [];
  const allSentences = [];

  for(const file of sample){
    try {
      const r = await fetch(file);
      if(!r.ok){ console.warn('fetchFragments: failed to load', file, r.status); continue; }
      const sentences = splitSentences(await r.text());

      sentences.forEach((s,j)=>{
        allSentences.push(s);
        if(j>0 && s.toLowerCase().includes(word)){
          candidates.push(sentences[j-1]);
        }
      });
    } catch(e){
      console.warn('Could not load', file, e);
    }
  }

  console.log('fetchFragments: found', candidates.length, 'candidates,', allSentences.length, 'total sentences');
  const pool = candidates.length>0 ? candidates : allSentences;
  const result = [];
  const available = shuffle([...pool]);
  for(let i=0; i<count && i<available.length; i++){
    result.push(available[i]);
  }
  console.log('fetchFragments: returning', result.length, 'fragments:', result);
  return result;
}

function placeholder(w,h,color){
  const c=document.createElement('canvas');
  c.width=w;c.height=h;
  const ctx=c.getContext('2d');
  ctx.fillStyle=color; ctx.fillRect(0,0,w,h);
  return c.toDataURL();
}

/* ═══════════════════════
   FROG INTERACTION
═══════════════════════ */
function initFrog(){
  const frog = document.getElementById('frog-img');
  if(!frog) return;

  frog.addEventListener('mouseenter', ()=>{ frog.src='frog_blue.svg'; });
  frog.addEventListener('mouseleave', ()=>{ frog.src='frog.svg'; });
  frog.style.cursor = 'pointer';
  frog.addEventListener('click', startFrogSequence);
}

function startFrogSequence(){
  const msgs = [
    { text: "CROAK!",                                                              secs: 3 },
    { text: "This looks like a self fulfilling prophecy, no?!",                   secs: 5 },
    { text: "Why did we ask these questions\nover 50 years ago?",                 secs: 4 },
    { text: "Who did ask them?",                                                   secs: 4 },
    { text: "Why did nothing change but get worse?",                               secs: 5 },
    { text: "Questions preconfigure answers...",                                   secs: 3 },
    { text: "What questions were not asked,\nwhose voices not listened to?",      secs: 5 },
    { text: "Let me bring you to the swamp...",                                    secs: 3 }
  ];
  showFrogBubble(msgs, 0, ()=>{ setTimeout(showSwampOracle, 200); });
}

function showFrogBubble(msgs, idx, onDone){
  const old = document.getElementById('frog-bubble');
  if(old) old.remove();

  if(idx >= msgs.length){ if(onDone) onDone(); return; }

  const msg = msgs[idx];
  const bubble = document.createElement('div');
  bubble.id = 'frog-bubble';
  bubble.style.cssText = `
    position:absolute;
    bottom:165px; right:14px;
    font-family:'Oswald', Arial, sans-serif; font-size:14pt; color:#fff;
    background:#000;
    border:1px solid #fff;
    padding:12px 16px;
    max-width:280px;
    line-height:1.6;
    text-align:center;
    z-index:200;
    opacity:0;
    transition:opacity 0.4s;
    white-space:pre-line;
  `;
  bubble.textContent = msg.text;
  document.getElementById('reveal-screen').appendChild(bubble);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ bubble.style.opacity='1'; }));

  setTimeout(()=>{
    bubble.style.opacity='0';
    setTimeout(()=>showFrogBubble(msgs, idx+1, onDone), 400);
  }, msg.secs * 1000);
}

/* ═══════════════════════
   SWAMP ORACLE SCREEN
═══════════════════════ */
function showSwampOracle(){
  showScreen('swamp-screen');
  drawSwamp();
}

function drawSwamp(){
  const svg = document.getElementById('swamp-svg');
  svg.innerHTML='';

  const W=window.innerWidth, H=window.innerHeight;
  const BASE=Math.min(W,H);
  const FS  = Math.max(11, BASE*0.013);
  const DOT = Math.max(4,  BASE*0.007);
  const PURPLE = '#cc44ff';
  const WHITE  = '#ffffff';

  // background — fullscreen
  svg.appendChild(el('image',{
    href:'swamp_bg.svg',
    x:0, y:0, width:W, height:H,
    preserveAspectRatio:'xMidYMid slice'
  }));

  const LBOX_W = Math.round(BASE*0.16);
  const MARGIN = 80;   // keep labels away from screen edges
  const FROG_ZONE = Math.round(BASE*0.18); // keep labels away from frog corner
  const qs = shuffle(SWAMP_QUESTIONS);

  // place labels using a simple rejection-sampling grid
  // divide screen into a loose grid and pick a random spot per cell
  const cols = 5, rows = 4;
  const cellW = (W - MARGIN*2) / cols;
  const cellH = (H - MARGIN*2) / rows;
  const positions = [];
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      positions.push({
        x: MARGIN + c*cellW + Math.random()*(cellW*0.5),
        y: MARGIN + r*cellH + Math.random()*(cellH*0.5)
      });
    }
  }
  const shuffledPos = shuffle(positions);

  qs.forEach((q, i)=>{
    if(i >= shuffledPos.length) return;
    let {x, y} = shuffledPos[i];

    // push away from bottom-right frog corner
    if(x > W - FROG_ZONE - LBOX_W && y > H - FROG_ZONE){
      y = H - FROG_ZONE - 60;
    }
    // clamp to screen
    x = Math.max(MARGIN, Math.min(W - LBOX_W - MARGIN, x));
    y = Math.max(MARGIN, Math.min(H - 120, y));

    // dot
    const c = el('circle',{ cx:x, cy:y, r:DOT, fill:WHITE, cursor:'pointer' });
    svg.appendChild(c);

    // label box
    const fo = el('foreignObject',{ x:x+DOT*1.5, y:y-FS, width:LBOX_W, height:300 });
    const div = document.createElement('div');
    div.style.cssText=`
      font-family:'Oswald', Arial, sans-serif;
      font-size:${FS+2}px;
      font-weight:bold;
      color:${WHITE};
      line-height:1.4;
      cursor:pointer;
      word-wrap:break-word;
      overflow:visible;
    `;
    div.textContent = q.text;
    fo.appendChild(div);
    svg.appendChild(fo);

    // hover — dot and text turn purple
    const onEnter = ()=>{
      c.setAttribute('fill', PURPLE);
      div.style.color = PURPLE;
      const d=document.getElementById('swamp-source');
      d.textContent = q.source + '; ' + q.year;
      d.style.opacity='1';
    };
    const onLeave = ()=>{
      c.setAttribute('fill', WHITE);
      div.style.color = WHITE;
      document.getElementById('swamp-source').style.opacity='0';
    };
    [c, fo].forEach(node=>{
      node.addEventListener('mouseenter', onEnter);
      node.addEventListener('mouseleave', onLeave);
      node.addEventListener('click', onEnter);
    });
  });

  // frog — drawn last so it's always on top, click to reload
  const frogSize = Math.round(BASE*0.14);
  const frogEl = el('image',{
    href:'frog.svg',
    x: W - frogSize - 14,
    y: H - frogSize - 14,
    width: frogSize,
    height: frogSize,
    preserveAspectRatio:'xMidYMid meet',
    cursor:'pointer'
  });
  frogEl.addEventListener('mouseenter', ()=>frogEl.setAttribute('href','frog_blue.svg'));
  frogEl.addEventListener('mouseleave', ()=>frogEl.setAttribute('href','frog.svg'));
  frogEl.addEventListener('click', ()=>{ initOracle(); showScreen('oracle-screen'); });
  svg.appendChild(frogEl);
}

window.addEventListener('resize',()=>{
  if(document.getElementById('oracle-screen').classList.contains('active'))
    render(!!chosenLens);
  if(document.getElementById('swamp-screen').classList.contains('active'))
    drawSwamp();
});
loadDataFiles().then(()=>{
  initOracle();
  setTimeout(()=>showScreen('oracle-screen'), 4000);
});
</script>
